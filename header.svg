<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/>
      <stop offset="60%" stop-color="#0d1424"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#19c0ff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#19c0ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#19c0ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1f2937" stroke-width="0.5" stroke-opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)" rx="16"/>
  <rect width="1200" height="340" fill="url(#grid)" rx="16"/>

  <!-- Ambient glows -->
  <circle cx="980" cy="170" r="260" fill="url(#glow1)"/>
  <circle cx="1100" cy="60" r="180" fill="url(#glow2)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)"/>

  <!-- Agent network visualization (right side) -->
  <g transform="translate(760, 50)" opacity="0.95">
    <!-- Connections -->
    <g stroke="url(#accent)" stroke-opacity="0.45" stroke-width="1.2" fill="none">
      <line x1="200" y1="120" x2="80"  y2="40"/>
      <line x1="200" y1="120" x2="80"  y2="120"/>
      <line x1="200" y1="120" x2="80"  y2="200"/>
      <line x1="200" y1="120" x2="320" y2="40"/>
      <line x1="200" y1="120" x2="320" y2="120"/>
      <line x1="200" y1="120" x2="320" y2="200"/>
      <line x1="320" y1="40"  x2="400" y2="80"/>
      <line x1="320" y1="120" x2="400" y2="80"/>
      <line x1="320" y1="120" x2="400" y2="160"/>
      <line x1="320" y1="200" x2="400" y2="160"/>
    </g>

    <!-- Outer nodes (agents) -->
    <g>
      <circle cx="80"  cy="40"  r="6" fill="#19c0ff"/>
      <circle cx="80"  cy="120" r="6" fill="#19c0ff"/>
      <circle cx="80"  cy="200" r="6" fill="#19c0ff"/>
      <circle cx="320" cy="40"  r="6" fill="#a78bfa"/>
      <circle cx="320" cy="120" r="6" fill="#a78bfa"/>
      <circle cx="320" cy="200" r="6" fill="#a78bfa"/>
      <circle cx="400" cy="80"  r="5" fill="#7dd3fc"/>
      <circle cx="400" cy="160" r="5" fill="#7dd3fc"/>
    </g>

    <!-- Core node (orchestrator) -->
    <circle cx="200" cy="120" r="22" fill="#0a0f1c" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="200" cy="120" r="10" fill="url(#accent)"/>
    <circle cx="200" cy="120" r="34" fill="none" stroke="#7c5cff" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="200" cy="120" r="48" fill="none" stroke="#7c5cff" stroke-opacity="0.12" stroke-width="1"/>
  </g>

  <!-- Name -->
  <text x="64" y="116" fill="#ffffff" font-size="50" font-weight="800" letter-spacing="1.5">WELLINGTON BRITO</text>

  <!-- Accent underline -->
  <rect x="64" y="134" width="44" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Focus -->
  <text x="64" y="172" fill="#a5b4fc" font-size="17" font-weight="600">
    <tspan>Focused on</tspan>
    <tspan fill="#19c0ff" font-weight="700"> AI &amp; Agents</tspan>
    <tspan fill="#6e7681"> · </tspan>
    <tspan>Intelligent Search</tspan>
    <tspan fill="#6e7681"> · </tspan>
    <tspan>Platform Engineering</tspan>
  </text>

  <!-- Tagline -->
  <text x="64" y="204" fill="#8b949e" font-size="14">9+ years building and scaling mobile, web, and AI-powered platforms.</text>

  <!-- Chips -->
  <g font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, monospace" font-size="12">
    <g transform="translate(64,236)">
      <rect width="96"  height="28" rx="14" fill="#7c5cff" fill-opacity="0.12" stroke="#7c5cff" stroke-opacity="0.45"/>
      <text x="48" y="18" text-anchor="middle" fill="#c4b5fd" font-weight="600">AI Agents</text>
    </g>
    <g transform="translate(168,236)">
      <rect width="64"  height="28" rx="14" fill="#19c0ff" fill-opacity="0.12" stroke="#19c0ff" stroke-opacity="0.45"/>
      <text x="32" y="18" text-anchor="middle" fill="#7dd3fc" font-weight="600">LLMs</text>
    </g>
    <g transform="translate(240,236)">
      <rect width="120" height="28" rx="14" fill="#34d399" fill-opacity="0.10" stroke="#34d399" stroke-opacity="0.40"/>
      <text x="60" y="18" text-anchor="middle" fill="#6ee7b7" font-weight="600">Vector Search</text>
    </g>
    <g transform="translate(368,236)">
      <rect width="116" height="28" rx="14" fill="#fb923c" fill-opacity="0.10" stroke="#fb923c" stroke-opacity="0.40"/>
      <text x="58" y="18" text-anchor="middle" fill="#fdba74" font-weight="600">React Native</text>
    </g>
    <g transform="translate(492,236)">
      <rect width="92"  height="28" rx="14" fill="#f472b6" fill-opacity="0.10" stroke="#f472b6" stroke-opacity="0.40"/>
      <text x="46" y="18" text-anchor="middle" fill="#f9a8d4" font-weight="600">Typesense</text>
    </g>
  </g>

  <!-- Footer line -->
  <line x1="64" y1="290" x2="640" y2="290" stroke="#1f2937" stroke-width="1"/>
  <g font-size="13" fill="#6e7681">
    <text x="64"  y="314">Campinas · SP · Brazil</text>
    <text x="220" y="314" fill="#30363d">|</text>
    <text x="240" y="314">B.Sc. Artificial Intelligence — FIAP</text>
    <text x="490" y="314" fill="#30363d">|</text>
    <text x="510" y="314">UNICAMP</text>
  </g>
</svg>
